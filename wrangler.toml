name = "cass-scraper"
main = "index.js"
compatibility_date = "2026-04-04"
compatibility_flags = ["nodejs_compat"]

# Browser Rendering binding
[browser]
binding = "BROWSER"

# KV namespace — replace with your actual namespace ID after running:
# npx wrangler kv namespace create MATCH_DATA
[[kv_namespaces]]
binding = "MATCH_DATA"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Cron trigger — scrapes every 3 hours
[triggers]
crons = ["0 */3 * * *"]

# Slugs are now fetched dynamically from SITE_URL/assets/events.json
# No need to maintain MATCH_SLUGS here — just keep SITE_URL up to date
[vars]
SITE_URL = "https://cascadeaction.org"
