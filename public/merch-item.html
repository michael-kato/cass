<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Cascade Action Shooting Sports</title>
  <link rel="stylesheet" href="assets/shared.css" />
  <style>
    .item-main {
      padding: 2.5rem var(--site-gutter) 4rem;
      max-width: var(--content-standard);
      margin: 0 auto;
    }

    .item-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-bottom: 4rem;
    }

    .item-gallery {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .item-image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .item-image-grid.is-single .image-magnifier-wrapper {
      grid-column: 1 / -1;
    }

    .image-magnifier-wrapper {
      position: relative;
      overflow: visible;
      border-radius: 4px;
      background: var(--sage-mid);
    }

    .image-magnifier-wrapper:hover {
      z-index: 5;
    }

    .grid-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      cursor: crosshair;
      border-radius: 4px;
      transition: opacity 0.2s;
      /* The lens distortion will be dynamically applied here */
      filter: url('#lensDistortion');
    }

    .grid-image:hover {
      opacity: 0.9;
    }

    .magnifier-lens {
      position: absolute;
      width: 420px;
      height: 420px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%);
      background-repeat: no-repeat;
      background-size: auto;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.25);
      transition: opacity 0.2s;
      z-index: 10;
    }

    .image-magnifier-wrapper:hover .magnifier-lens {
      opacity: 1;
    }

    .item-details {
      display: flex;
      flex-direction: column;
    }

    .item-header h1 {
      font-weight: 400;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }

    .item-price {
      font-size: 1.1rem;
      color: var(--olive);
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .item-section {
      margin-bottom: 1.5rem;
    }

    .item-section-label {
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--text-light);
      margin-bottom: 0.75rem;
    }

    .option-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .option-btn {
      padding: 0.5rem 1rem;
      border: 1.5px solid var(--sage-mid);
      background: transparent;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-dark);
      border-radius: 2px;
    }

    .option-btn:hover {
      border-color: var(--text-dark);
    }

    .option-btn.selected {
      background: var(--text-dark);
      color: var(--white);
      border-color: var(--text-dark);
    }

    .item-quantity {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-qty {
      padding: 0.5rem 0.8rem;
      border: none;
      border-radius: 3px;
      background: var(--olive);
      color: var(--white);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-qty:hover {
      background: var(--dark);
    }

    .quantity-input {
      width: 3.5rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--sage-mid);
      border-radius: 3px;
      background: var(--sage-light);
      color: var(--text-dark);
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      outline: none;
    }

    .quantity-input:focus {
      border-color: var(--olive);
    }

    .item-actions {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn-add-cart {
      width: 100%;
      padding: 1rem;
      background: var(--olive);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-add-cart:hover {
      background: var(--dark);
    }

    .btn-add-cart:active {
      transform: scale(0.98);
    }

    .item-description {
      padding-top: 2rem;
      border-top: 1px solid var(--sage-mid);
      margin-bottom: 2rem;
    }

    .item-description p {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text-mid);
      margin-bottom: 1rem;
    }

    .item-description li {
      margin-bottom: 0.35rem;
    }

    .item-description p:last-child {
      margin-bottom: 0;
    }

    .for-you {
      margin-top: 4rem;
      padding-top: 3rem;
      border-top: 1px solid var(--sage-mid);
    }

    .for-you-title {
      margin-bottom: 1.5rem;
    }



    @media (max-width: 900px) {
      .item-container {
        grid-template-columns: 1fr;
      }


    }

    @media (max-width: 600px) {
      .item-main {
        padding: 1.5rem 1rem 2rem;
      }

      .item-container {
        gap: 1.5rem;
      }

      .item-image-grid {
        grid-template-columns: 1fr;
      }

      .magnifier-lens {
        display: none;
      }



      .item-quantity {
        gap: 0.5rem;
      }

      .quantity-input {
        width: 100%;
        max-width: 4.5rem;
      }
    }
  </style>
</head>

<body>

  <div id="site-nav"></div>

  <div class="item-main">
    <!-- Loading state -->
    <div id="loading" style="text-align: center; padding: 3rem;">
      <p>Loading product...</p>
    </div>

    <!-- Product container (hidden initially) -->
    <div id="product-container" style="display: none;">
      <div class="item-container">
        <!-- Gallery -->
        <div class="item-gallery">
          <div class="item-image-grid" id="image-grid"></div>
        </div>

        <!-- Details -->
        <div class="item-details">
          <div class="item-header">
            <h1 id="product-name"></h1>
            <div class="item-price" id="product-price"></div>
          </div>

          <!-- Color options (if available) -->
          <div id="color-section" class="item-section" style="display: none;">
            <div class="item-section-label">Color</div>
            <div class="option-grid" id="color-grid"></div>
          </div>

          <!-- Size options (if available) -->
          <div id="size-section" class="item-section" style="display: none;">
            <div class="item-section-label">Size</div>
            <div class="option-grid" id="size-grid"></div>
          </div>

          <!-- Quantity -->
          <div class="item-section">
            <div class="item-section-label">Quantity</div>
            <div class="item-quantity">
              <button onclick="decreaseQty()" class="btn-qty" aria-label="Decrease quantity">−</button>
              <input id="qty-input" type="number" class="quantity-input" value="1" min="1" />
              <button onclick="increaseQty()" class="btn-qty" aria-label="Increase quantity">+</button>
            </div>
          </div>

          <!-- Action buttons -->
          <div class="item-actions">
            <button class="btn-add-cart" onclick="handleAddToCart()">Add to cart</button>
          </div>
        </div>
      </div>

      <!-- Description -->
      <div id="description-section" class="item-description rich-text" style="display: none;">
        <div id="product-description"></div>
      </div>

      <!-- For You section -->
      <div class="for-you">
        <h2 class="for-you-title">For You</h2>
        <div class="merch-grid" id="for-you-grid"></div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="assets/shared.js"></script>
  <script>
    initPage('merch');

    const IMAGE_BASE = 'assets/merch/';
    let allMerch = [];
    let currentProduct = null;
    let selectedColor = null;
    let selectedSize = null;
    let currentImages = [];

    const sizeScales = {
      'S': 0.8,
      'M': 1,
      'L': 1.1,
      'XL': 1.2,
      '2XL': 1.5
    };

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
    }

    function getProductImages() {
      let imgs = [...(currentProduct.images || [])];
      if (selectedColor && currentProduct.colors && currentProduct.colors[selectedColor]) {
        imgs.push(...currentProduct.colors[selectedColor]);
      }
      return imgs.filter(img => img);
    }

    function renderGallery() {
      const scale = sizeScales[selectedSize] || 1;
      currentImages = getProductImages().map(img => IMAGE_BASE + img);

      const grid = document.getElementById('image-grid');
      grid.classList.toggle('is-single', currentImages.length === 1);
      grid.innerHTML = currentImages.map(img => `
        <div class="image-magnifier-wrapper" style="overflow: hidden;">
          <img src="${img}" alt="Product" class="grid-image" />
          <div class="magnifier-lens"></div>
        </div>
      `).join('');

      document.querySelectorAll('.image-magnifier-wrapper').forEach(wrapper => {
        const img = wrapper.querySelector('img');
        const lens = wrapper.querySelector('.magnifier-lens');

        wrapper.addEventListener('mousemove', event => {
          const rect = wrapper.getBoundingClientRect();
          const x = event.clientX - rect.left;
          const y = event.clientY - rect.top;
          const lensX = x;
          const lensY = y;
          const lensWidth = 420 * scale;
          const lensHeight = 420 * scale;
          const zoom = 2;

          const naturalWidth = img.naturalWidth;
          const naturalHeight = img.naturalHeight;
          const widthRatio = rect.width / naturalWidth;
          const heightRatio = rect.height / naturalHeight;
          const coverScale = Math.max(widthRatio, heightRatio);
          const displayWidth = naturalWidth * coverScale;
          const displayHeight = naturalHeight * coverScale;
          const offsetX = (displayWidth - rect.width) / 2;
          const offsetY = (displayHeight - rect.height) / 2;

          lens.style.left = `${lensX}px`;
          lens.style.top = `${lensY}px`;
          lens.style.width = `${lensWidth}px`;
          lens.style.height = `${lensHeight}px`;
          lens.style.backgroundImage = `url(${img.src})`;
          lens.style.backgroundSize = `${displayWidth * zoom}px ${displayHeight * zoom}px`;

          const imageX = x + offsetX;
          const imageY = y + offsetY;
          const bgX = -(imageX * zoom - lensWidth / 2);
          const bgY = -(imageY * zoom - lensHeight / 2);
          lens.style.backgroundPosition = `${bgX}px ${bgY}px`;
        });

        wrapper.addEventListener('mouseleave', () => {
          lens.style.opacity = '0';
        });

        wrapper.addEventListener('mouseenter', () => {
          lens.style.opacity = '1';
        });
      });
    }

    async function loadProduct() {
      // Get product ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');

      if (!productId) {
        document.getElementById('loading').textContent = 'Product not found.';
        return;
      }

      try {
        allMerch = await loadToml('assets/merch.toml', 'products', { markdownFields: ['description'] });

        currentProduct = allMerch.find(p => p.id === productId);
        if (!currentProduct) {
          document.getElementById('loading').textContent = 'Product not found.';
          return;
        }

        renderProduct();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('product-container').style.display = 'block';
      } catch (err) {
        console.error('Failed to load product:', err);
        document.getElementById('loading').textContent = 'Failed to load product.';
      }
    }

    function renderProduct() {
      // Set title
      document.title = currentProduct.name + ' — Cascade Action Shooting Sports';

      // Header
      document.getElementById('product-name').textContent = currentProduct.name;
      document.getElementById('product-price').textContent = formatCurrency(currentProduct.price);

      // Colors
      if (currentProduct.colors && Object.keys(currentProduct.colors).length > 0) {
        selectedColor = selectedColor || Object.keys(currentProduct.colors)[0];
        document.getElementById('color-section').style.display = 'block';
        document.getElementById('color-grid').innerHTML = Object.keys(currentProduct.colors).map(c => `
          <button class="option-btn ${c === selectedColor ? 'selected' : ''}"
                  onclick="selectColor('${c}')">${c}</button>
        `).join('');
      }

      // Gallery
      renderGallery();

      // Sizes
      if (currentProduct.sizes && currentProduct.sizes.length > 0) {
        selectedSize = selectedSize || (currentProduct.sizes.includes('M') ? 'M' : currentProduct.sizes[0]);
        document.getElementById('size-section').style.display = 'block';
        document.getElementById('size-grid').innerHTML = currentProduct.sizes.map(s => `
          <button class="option-btn ${s === selectedSize ? 'selected' : ''}" data-size="${s}"
                  onclick="selectSize('${s}')">${s}</button>
        `).join('');
      }

      // Description
      if (currentProduct.description) {
        document.getElementById('description-section').style.display = 'block';
        if (currentProduct.description) {
          document.getElementById('product-description').innerHTML = currentProduct.descriptionHtml || '';
        }
      }

      // For You — random other items (4 items max)
      const others = allMerch.filter(p => p.id !== currentProduct.id);
      const shuffle = [...others].sort(() => Math.random() - 0.5).slice(0, 4);
      document.getElementById('for-you-grid').innerHTML = shuffle.map(p => `
        <div class="merch-card">
          <a href="merch-item.html?id=${p.id}">
            <div class="merch-img" style="background-image:url('${IMAGE_BASE + (p.images?.[0] || '')}')"></div>
            <div class="merch-info">
              <div class="merch-name">${p.name}</div>
              <div class="merch-price">${formatCurrency(p.price)}</div>
            </div>
          </a>
        </div>
      `).join('');
    }

    function selectColor(color) {
      selectedColor = color;
      document.querySelectorAll('#color-grid .option-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.textContent.trim() === color);
      });
      renderGallery();
    }

    // ── Lens Distortion Engine ──
    const initLensEngine = () => {
      const canvas = document.createElement('canvas');
      const size = 128; // Standard 128px array
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(size, size);
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const nx = (x / size) * 2 - 1, ny = (y / size) * 2 - 1;
          const r = Math.sqrt(nx * nx + ny * ny);
          let dist = (1 - r * r); if (dist < 0) dist = 0;

          const dx = nx * dist, dy = ny * dist;
          const rVal = Math.floor(((dx + 1) / 2) * 255);
          const gVal = Math.floor(((dy + 1) / 2) * 255);

          const idx = (y * size + x) * 4;
          imgData.data[idx] = rVal; imgData.data[idx + 1] = gVal; imgData.data[idx + 2] = 0; imgData.data[idx + 3] = 255;
        }
      }
      ctx.putImageData(imgData, 0, 0);

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.style.position = 'absolute'; svg.style.width = '0'; svg.style.height = '0';
      svg.innerHTML = `
        <defs>
          <filter id="lensDistortion" color-interpolation-filters="sRGB">
            <feImage href="${canvas.toDataURL()}" result="mapRaw" preserveAspectRatio="none"/>
            <feGaussianBlur in="mapRaw" stdDeviation="4" result="mapSmooth" />
            <feDisplacementMap in="SourceGraphic" in2="mapSmooth" scale="0" xChannelSelector="R" yChannelSelector="G" id="displacementScaler" />
          </filter>
        </defs>`;
      document.body.appendChild(svg);
    };

    let currentLensScale = 0;
    let lensAnimFrame;
    function animateLens(target) {
      if (lensAnimFrame) cancelAnimationFrame(lensAnimFrame);
      const displacer = document.getElementById('displacementScaler');
      if (!displacer) return;
      function step() {
        currentLensScale += (target - currentLensScale) * 0.12;
        displacer.setAttribute('scale', currentLensScale);
        if (Math.abs(target - currentLensScale) > 0.5) lensAnimFrame = requestAnimationFrame(step);
        else displacer.setAttribute('scale', target);
      }
      step();
    }

    const distortionScales = {
      'S': 80,    // Pinch inwards
      'M': 0,     // Flat glass
      'L': -40,   // Slight bulge
      'XL': -80,  // Medium bulge
      '2XL': -140  // Extreme extreme distortion bulge
    };

    function selectSize(size) {
      selectedSize = size;
      document.querySelectorAll('#size-grid .option-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.textContent.trim() === size);
      });
      // Fire mathematical optical glass distortion animation locally
      const targetScale = distortionScales[size] || 0;
      animateLens(targetScale);
    }

    function getQuantity() {
      return parseInt(document.getElementById('qty-input').value) || 1;
    }

    function increaseQty() {
      const input = document.getElementById('qty-input');
      input.value = (parseInt(input.value) || 0) + 1;
    }

    function decreaseQty() {
      const input = document.getElementById('qty-input');
      const val = parseInt(input.value) || 1;
      if (val > 1) input.value = val - 1;
    }

    function handleAddToCart() {
      let id = currentProduct.id;
      let name = currentProduct.name;

      // Add variant info to ID and name if applicable
      if (selectedColor && currentProduct.colors && currentProduct.colors[selectedColor]) {
        id = `${id}-${selectedColor}`;
        name = `${name} — ${selectedColor}`;
      }
      if (selectedSize && currentProduct.sizes.length > 0) {
        id = `${id}-${selectedSize}`;
        name = `${name} — ${selectedSize}`;
      }

      const cartItem = {
        id,
        name,
        price: currentProduct.price,
        image: IMAGE_BASE + (currentProduct.images && currentProduct.images[0] ? currentProduct.images[0] : ''),
        quantity: getQuantity(),
      };

      addToCart(cartItem);
    }

    // Inject the SVG lens physics node logic into the DOM
    initLensEngine();

    // Load on page load
    loadProduct();
  </script>
</body>

</html>
