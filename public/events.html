<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events - Cascade Action Shooting Sports</title>
  <link rel="stylesheet" href="assets/shared.css" />
  <style>
    .filters {
      background: var(--dark-mid); padding: 1rem var(--site-gutter);
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
    .search-wrap svg {
      position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: rgba(255,255,255,0.35); pointer-events: none;
    }
    .search-wrap input {
      width: 100%; padding: 0.55rem 0.75rem 0.55rem 2.25rem;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: var(--white); font-size: 0.88rem; outline: none;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .search-wrap input:focus { border-color: var(--accent); }
    .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 0.45rem 1rem; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.65);
      font-weight: 600; font-size: 0.82rem;
      letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--white); }
    .sort-select {
      padding: 0.5rem 0.75rem; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8);
      font-size: 0.85rem; outline: none; cursor: pointer; margin-left: auto;
    }
    .sort-select option { background: var(--dark-mid); color: var(--white); }

    .results-bar {
      padding: 0.9rem var(--site-gutter);
      font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-light); border-bottom: 1px solid var(--sage-mid);
    }
    .results-bar span { color: var(--olive); font-weight: 700; }

    .events-section { padding: 2rem var(--site-gutter); }
    .events-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }

    /* ── Event card ── */
    .event-card {
      border-radius: 10px;
      overflow: hidden; display: flex; flex-direction: column;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .event-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.25); }

    /* Image area */
    .event-card-img {
      width: 100%; height: 160px;
      position: relative; overflow: hidden; flex-shrink: 0;
      background: #2a3a2a center/cover;
    }
    .event-card-img img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    /* Low-light darkness overlay on the image - haha*/
    .event-card-img .lowlight-overlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(0,0,0,1);
      /* subtle vignette */
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,1) 100%);
    }
    .event-card.is-lowlight .event-card-img .lowlight-overlay { display: block; }

    /* Moon icon badge for low-light */
    .lowlight-badge {
      display: none;
      position: absolute; bottom: 0.6rem; right: 0.6rem;
      background: rgba(0,0,0,0.6); border-radius: 50%;
      width: 28px; height: 28px;
      align-items: center; justify-content: center;
    }
    .event-card.is-lowlight .lowlight-badge { display: flex; }
    .lowlight-badge svg { width: 15px; height: 15px; color: #c8d8ff; }

    .event-date-badge {
      position: absolute; top: 0.75rem; left: 0.75rem;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      color: var(--white); padding: 0.35rem 0.6rem; text-align: center; min-width: 52px;
      border-radius: 4px;
    }
    .event-date-badge .month { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
    .event-date-badge .day   { font-size: 1.5rem; font-weight: 800; line-height: 1; }
    .event-date-badge .dow   { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-top: 1px; }

    /* Body - colored by venue */
    .event-card-body {
      padding: 0.85rem 1rem 1rem;
      flex: 1; display: flex; flex-direction: column;
      /* background set inline from venue.color */
    }
    .event-card h3 {
      font-weight: 800; font-size: 1.15rem;
      line-height: 1.15; margin-bottom: 0.5rem; color: #fff;
    }
    .event-meta { display: flex; flex-direction: column; gap: 0.2rem; margin-bottom: 0.75rem; }
    .event-meta-row {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.8rem; color: rgba(255,255,255,0.75);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-meta-row svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.8; }

    .event-card-footer {
      display: flex; align-items: stretch; justify-content: center;
      margin-top: auto; padding-top: 0.85rem;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .event-spots { font-size: 0.78rem; color: rgba(255,255,255,0.7); }
    .event-spots strong { color: #fff; }

    .btn-signup {
      flex: 1;
      text-align: center;
      padding: 0.55rem 1rem;
      background: rgba(0,0,0,0.35); color: #fff;
      font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 2px;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .btn-signup:hover { background: rgba(0,0,0,0.55); border-color: rgba(255,255,255,0.6); }

    /* Community section */
    .community-section { padding: 0 var(--site-gutter) 4rem; }
    .section-divider { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .section-divider h2 { white-space: nowrap; }
    .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--sage-mid); }
    .section-divider .divider-note { font-size: 0.8rem; color: var(--text-light); white-space: nowrap; }
    .community-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .community-card {
      background: var(--sage-light); border: 1px solid var(--sage-mid); border-left: 3px solid var(--olive-light);
      padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.4rem; transition: box-shadow 0.2s;
    }
    .community-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .community-card h4 { font-weight: 700; font-size: 1.05rem; }
    .community-card p { font-size: 0.82rem; color: var(--text-light); line-height: 1.5; }
    .community-meta { font-size: 0.78rem; color: var(--olive); font-weight: 600; letter-spacing: 0.04em; }

    /* Modal */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--cream); max-width: 560px; width: 100%;
      max-height: 90vh; overflow-y: auto; position: relative;
      border-radius: 6px; animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .modal-img {
      width: 100%; height: 200px; background: #2a3a2a center/cover;
      border-radius: 6px 6px 0 0; overflow: hidden; position: relative;
    }
    @keyframes kenburns {
      0% { transform: scale(1); }
      100% { transform: scale(1.08); }
    }
    .modal-img img { 
      width: 100%; height: 100%; object-fit: cover; display: block; 
      animation: kenburns 16s ease-in-out infinite alternate;
    }
    .modal-img .lowlight-overlay {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.65) 100%);
    }
    .modal-close {
      position: absolute; top: 0.75rem; right: 0.75rem;
      background: rgba(0,0,0,0.5); border: none; cursor: pointer; color: white;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close svg { width: 18px; height: 18px; }
    .modal-body { padding: 1.5rem; }
    .modal-body h2 { font-weight: 800; font-size: 1.6rem; line-height: 1.15; margin-bottom: 1.25rem; }
    
    .modal-details { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .modal-detail { 
      display: flex; align-items: flex-start; justify-content: flex-start; gap: 1rem;
      padding-bottom: 1rem; border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .modal-detail:last-child { border-bottom: none; padding-bottom: 0; }
    .modal-detail-label { display: flex; align-items: center; gap: 0.5rem; color: var(--text-mid); font-weight: 600; font-size: 0.9rem; flex-shrink: 0; min-width: 84px; }
    .modal-detail-label svg { width: 16px; height: 16px; color: var(--olive); }
    .modal-detail-values { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: flex-start; text-align: left; }
    
    .modal-link-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.35rem 0.6rem;
      background: #f4f5f4; border: 1px solid var(--sage-mid);
      border-radius: 4px; color: var(--text-dark);
      text-decoration: none; font-size: 0.82rem; font-weight: 600;
      transition: all 0.2s ease;
    }
    .modal-link-btn:hover {
      background: var(--sage-mid); border-color: var(--olive);
    }
    .modal-desc { font-size: 0.9rem; line-height: 1.45; color: var(--text-mid); margin-bottom: 1.25rem; padding-top: 1rem; border-top: 1px solid rgba(0,0,0,0.06); }
    .modal-actions { display: flex; gap: 0.75rem; }
    .btn-register {
      flex: 1; padding: 0.75rem; background: var(--dark); color: var(--white);
      font-size: 1rem; border: none; text-align: center; display: block;
      border-radius: 3px;
    }
    .btn-register:hover { background: var(--olive); }
    .btn-secondary {
      padding: 0.75rem 1.25rem; background: transparent; border: 1.5px solid var(--dark);
      font-weight: 600; font-size: 0.9rem;
      border-radius: 3px;
    }

    @media (max-width: 1100px) {
      .events-grid { grid-template-columns: repeat(2, 1fr); }
      .community-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .filters { gap: 0.75rem; }
      .search-wrap { min-width: 100%; max-width: none; }
      .filter-group { width: 100%; }
      .sort-select { margin-left: 0; width: 100%; }
      .events-grid,
      .community-grid { grid-template-columns: 1fr; }
      .event-meta-row { white-space: normal; }
      .event-card-footer,
      .modal-actions { flex-direction: column; align-items: stretch; }
      .section-divider { flex-wrap: wrap; gap: 0.5rem 1rem; }
      .section-divider::after { display: none; }
      .section-divider .divider-note { width: 100%; white-space: normal; }
      .modal-detail { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .modal-detail-values { justify-content: flex-start; text-align: left; }
    }
  </style>
</head>
<body>

  <div id="site-nav"></div>

  <div class="filters">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search events, locations…" />
    </div>
    <div class="filter-group" id="type-filters">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="two-gun">Two Gun</button>
      <button class="filter-btn" data-type="low-light">Low Light</button>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="date">Sort: Date</option>
      <option value="state">Sort: State</option>
      <option value="name">Sort: Name</option>
    </select>
  </div>

  <div class="results-bar">Showing <span id="results-count">0</span> upcoming events</div>

  <section class="events-section">
    <div class="events-grid" id="events-grid"></div>
  </section>

  <section class="community-section">
    <div class="section-divider">
      <h2>Community Events</h2>
      <span class="divider-note">Hosted by friends and partners of CASS</span>
    </div>
    <div class="community-grid" id="community-grid"></div>
  </section>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <div class="modal-img" id="modal-img">
        <img id="modal-img-el" src="" alt="" />
      </div>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-body">
        <h2 id="modal-title"></h2>
        <div class="modal-details">
          <div class="modal-detail">
            <div class="modal-detail-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span>Date</span>
            </div>
            <div class="modal-detail-values" id="modal-date"></div>
          </div>
          <div class="modal-detail">
            <div class="modal-detail-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span>Venue</span>
            </div>
            <div class="modal-detail-values" id="modal-location"></div>
          </div>
        </div>
        <div class="modal-desc rich-text" id="modal-desc"></div>
        <div class="modal-actions">
          <a href="#" class="btn-register" id="modal-register">Register Now</a>
          <button class="btn-secondary" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="assets/shared.js"></script>
  <script>
    initPage('events');

    // ── Date utilities ────────────────────────────────────────────
    // Given an ISO date string "YYYY-MM-DD", derive all display fields.
    // Uses local date parsing (no UTC shift) by splitting the string.
    function deriveDate(isoString) {
      const [year, month, day] = isoString.split('-').map(Number);
      const d = new Date(year, month - 1, day);
      return {
        dateSort:  isoString,
        month:     d.toLocaleString('en-US', { month: 'short' }).toUpperCase(),   // "APR"
        day:       String(day),                                                    // "19"
        dayOfWeek: d.toLocaleString('en-US', { weekday: 'short' }).toUpperCase(), // "SUN"
        label:     d.toLocaleString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }), // "April 19, 2026"
        state:     null, // derived from venue after join
      };
    }

    // ── Community events (static, not in JSON yet) ────────────────
    const COMMUNITY = [
      { name:"SVRC - Cascade Action Shooting Sports Range Officer Training", meta:"Sept 17th · Fall City, WA", desc:"Want to learn how to RO action matches? Contact info@cascadeaction.org to sign up" },
    ];

    const SCRAPER_URL = 'https://cass-scraper.YOUR-SUBDOMAIN.workers.dev/data';

    let EVENTS = [];
    let activeType = 'all', searchTerm = '', sortBy = 'date';

    function locationLabel(e) {
      if (e.venue) return `${e.venue.name}, ${e.venue.state}`;
      return e.locationText || '';
    }

    function typeLabel(type) {
      return { 'two-gun': 'PCSL TWO GUN', 'low-light': 'PCSL ONE GUN - LOW LIGHT'}[type] || type.toUpperCase();
    }

    function renderEvents() {
      let filtered = EVENTS.filter(e => {
        const typeMatch = activeType === 'all' || e.type === activeType;
        const loc = locationLabel(e).toLowerCase();
        const searchMatch = !searchTerm ||
          e.name.toLowerCase().includes(searchTerm) ||
          loc.includes(searchTerm) ||
          (e.venue?.state || '').toLowerCase().includes(searchTerm);
        return typeMatch && searchMatch;
      });
      filtered.sort((a, b) =>
        sortBy === 'state' ? (a.venue?.state || '').localeCompare(b.venue?.state || '') :
        sortBy === 'name'  ? a.name.localeCompare(b.name) :
                             a.dateSort.localeCompare(b.dateSort)
      );

      document.getElementById('results-count').textContent = filtered.length;

      document.getElementById('events-grid').innerHTML = filtered.length === 0
        ? `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-light)">No events match your filters.</div>`
        : filtered.map(e => {
            const isLowLight = e.type === 'low-light';
            const cardColor = e.venue?.color || '#2a3a2a';
            const spotsLeft = e.spots - e.filled;
            const almostFull = e.filled / e.spots >= 0.9;
            return `
              <div class="event-card${isLowLight ? ' is-lowlight' : ''}" id="event-card-${e.id}" onclick="openModal(${e.id})" style="--card-color:${cardColor}">
                <div class="event-card-img" style="background-color:${cardColor}">
                  ${e.image ? `<img src="${e.image}" alt="${e.name}" loading="lazy" />` : ''}
                  <div class="lowlight-overlay"></div>
                  <div class="event-date-badge">
                    <div class="month">${e.month}</div>
                    <div class="day">${e.day}</div>
                    <div class="dow">${e.dayOfWeek}</div>
                  </div>
                  <div class="lowlight-badge">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                  </div>
                </div>
                <div class="event-card-body" style="background:${cardColor}">
                  <h3>${e.name}</h3>
                  <div class="event-meta">
                    <div class="event-meta-row">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                      ${locationLabel(e)}
                    </div>

                  </div>
                  <div class="event-card-footer">
                    <a href="${e.registerUrl}" target="_blank" rel="noopener noreferrer" class="btn-signup" onclick="event.stopPropagation()">Event Signup</a>
                  </div>
                </div>
              </div>`;
          }).join('');

      if (!window.hasScrolled) {
        const hId = new URLSearchParams(window.location.search).get('highlight');
        if (hId) {
          setTimeout(() => {
            const card = document.getElementById('event-card-' + hId);
            if (card) {
              window.hasScrolled = true;
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
              card.style.transition = 'box-shadow 0.3s, transform 0.3s, filter 0.3s';
              card.style.transform = 'scale(1.03)';
              card.style.filter = 'brightness(1.15)';
              card.style.boxShadow = '0 0 0 4px rgba(10,10,10,0.85), 0 16px 40px rgba(0,0,0,0.4)';
              setTimeout(() => { card.style.transform = ''; card.style.boxShadow = ''; card.style.filter = ''; }, 2500);
            }
          }, 100);
        }
      }
    }

    /* SPOTS
                        <div class="event-spots">
                      ${e.liveSpotsText
                        ? `<span title="Live from Practiscore">${e.liveSpotsText}</span>`
                        : `<strong>${spotsLeft}</strong> spots left${almostFull ? '<span style="color:#ffaaaa;font-weight:700;margin-left:0.3rem">· Almost full!</span>' : ''}`
                      }
                    </div>
    */

    function renderCommunity() {
      document.getElementById('community-grid').innerHTML = COMMUNITY.map(c => `
        <div class="community-card">
          <div class="community-meta">${c.meta}</div>
          <h4>${c.name}</h4>
          <p>${c.desc}</p>
        </div>`).join('');
    }

    function openModal(id) {
      const e = EVENTS.find(x => x.id === id);
      if (!e) return;
      const isLowLight = e.type === 'low-light';

      // Image
      const imgEl = document.getElementById('modal-img-el');
      const modalImgWrap = document.getElementById('modal-img');
      if (e.image) { imgEl.src = e.image; imgEl.style.display = 'block'; }
      else { imgEl.style.display = 'none'; }

      // Low-light overlay in modal
      let llOverlay = modalImgWrap.querySelector('.lowlight-overlay');
      if (!llOverlay) { llOverlay = document.createElement('div'); llOverlay.className = 'lowlight-overlay'; modalImgWrap.appendChild(llOverlay); }
      llOverlay.style.display = isLowLight ? 'block' : 'none';

      // Color the modal header strip
      modalImgWrap.style.background = e.venue?.color || '#2a3a2a';

      document.getElementById('modal-title').textContent = e.name;
      
      const dateText = `${e.label} (${e.dayOfWeek})`;
      document.getElementById('modal-date').innerHTML = e.calUrl
        ? `<a href="${e.calUrl}" target="_blank" rel="noopener noreferrer" class="modal-link-btn">${dateText} ↗</a>`
        : dateText;
        
      if (e.venue) {
        let nameHtml = '';
        if (e.venue.website) {
          nameHtml = `<a href="${e.venue.website}" target="_blank" rel="noopener noreferrer" class="modal-link-btn">${e.venue.name} ↗</a>`;
        } else {
          nameHtml = `<span style="font-weight:600; padding:0.35rem 0;">${e.venue.name}</span>`;
        }
        let addrHtml = e.mapLink 
          ? `<a href="${e.mapLink}" target="_blank" rel="noopener noreferrer" class="modal-link-btn">${e.venue.address} ↗</a>` 
          : `<span style="font-size:0.85rem; padding:0.35rem 0;">${e.venue.address}</span>`;
        
        document.getElementById('modal-location').innerHTML = nameHtml + addrHtml;
      } else {
        document.getElementById('modal-location').innerHTML = e.locationText || '';
      }
      
      document.getElementById('modal-desc').innerHTML = e.descHtml || '';
      document.getElementById('modal-register').href = e.registerUrl;

      document.getElementById('modal-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-backdrop').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.getElementById('type-filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn'); if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); activeType = btn.dataset.type; renderEvents();
    });
    document.getElementById('search-input').addEventListener('input', e => { searchTerm = e.target.value.toLowerCase().trim(); renderEvents(); });
    document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value; renderEvents(); });

    // Load both files in parallel, join, derive date fields, then render
    Promise.all([
      loadToml('assets/events.toml', 'events', { markdownFields: ['desc'] }),
      loadToml('assets/venues.toml', 'venues'),
    ]).then(([events, venues]) => {
      const venueMap = Object.fromEntries(venues.map(v => [v.id, v]));
      EVENTS = events.map(e => {
        const derived = deriveDate(e.date);
        const venue = venueMap[e.venueId] ?? null;
        
        let mapLink = null;
        if (venue && venue.address) {
          mapLink = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(venue.address)}`;
        }
        
        const [y, m, d] = e.date.split('-');
        const jsDate = new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10));
        jsDate.setDate(jsDate.getDate() + 1);
        const startStr = `${y}${m}${d}`;
        const endStr = `${jsDate.getFullYear()}${String(jsDate.getMonth() + 1).padStart(2, '0')}${String(jsDate.getDate()).padStart(2, '0')}`;
        const calUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(e.name)}&dates=${startStr}/${endStr}${venue && venue.address ? `&location=${encodeURIComponent(venue.address)}` : ''}`;

        return {
          ...e,
          ...derived,
          state: venue?.state ?? null,
          venue,
          mapLink,
          calUrl
        };
      });
      renderEvents();
      renderCommunity();

      return fetch(SCRAPER_URL);
    }).then(r => r.json()).then(matchData => {
      EVENTS.forEach(e => {
        const live = matchData[e.practiscoreSlug];
        if (live?.success && live.spotsText) e.liveSpotsText = live.spotsText;
      });
      renderEvents();
    }).catch(() => {});
  </script>
</body>
</html>
