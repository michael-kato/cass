desc = """
Come out to Bellevue Indoor Range for a 4 stage Low Light PCSL match!

YOU MUST CHECK IN AT RANGE DESK TO FILL OUT WAIVER

Setup at 9, New shooter orientation at 9:45. Safety briefing starts at 10:15. If you arrive after you will not be allowed to shoot.

ANYONE NEW TO BELLEVUE INDOOR RANGE IS REQUIRED TO ATTEND THE NEW SHOOTER ORIENTATION REGARDLESS OF EXPERIENCE LEVEL

Given the reduced lighting conditions we require participants to have attended at least 3 events with CASS to ensure familiarity with action shooting safety rules and match ettiquette. Please email info@cascadeaction.org for more info.

Required equipment:
Night Vision Division - Night vision device & familiarity
White light on ALL firearms AND handheld flashlight
Electronic Hearing Protection
Rifle with sling and three magazines - Caliber no greater than 7.62x39/300blk
Handgun with a safe holster and three magazines - No SERPA or Uncle Mikes style fabric holsters
Muzzle brakes / compensators / ports are prohibited unless used as a suppressor host
100 rounds for your rifle and handgun - No Steel Core (M855 / SS109) or similar ammunition

BELLEVUE INDOOR RANGE SOP:
Use of a Sig P320 in any form is prohibited
No M855 / SS109 / M855A1 allowed on premises - participant will be ejected and prohibited from attending any events
No food or drink allowed in the action bays
"""
