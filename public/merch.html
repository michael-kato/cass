<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merch / Swag - Cascade Action Shooting Sports</title>
  <link rel="stylesheet" href="assets/shared.css" />
  <style>
    .merch-main { padding: 2.5rem var(--site-gutter) 4rem; }


  </style>
</head>
<body>

  <div id="site-nav"></div>

  <div class="merch-main">
    <h1>Merchandise</h1>
    <div class="merch-grid" id="product-grid"></div>
  </div>

  <div id="site-footer"></div>

  <script src="assets/shared.js"></script>
  <script>
    initPage('merch');

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
    }

    loadToml('assets/merch.toml', 'products')
      .then(items => {
        document.getElementById('product-grid').innerHTML = items.map(p => {
          const image = p.images && p.images[0] ? `assets/merch/${p.images[0]}` : '';
          return `
            <div class="merch-card">
              <a href="merch-item.html?id=${p.id}">
                <div class="merch-img" style="background-image:url('${image}')"></div>
                <div class="merch-info">
                  <div class="merch-name">${p.name}</div>
                  <div class="merch-price">${formatCurrency(p.price)}</div>
                </div>
              </a>
            </div>`;
        }).join('');
      });
  </script>
</body>
</html>
