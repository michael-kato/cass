<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merch / Swag — Cascade Action Shooting Sports</title>
  <link rel="stylesheet" href="assets/shared.css" />
  <style>
    .merch-main { padding: 2.5rem 2rem 4rem; max-width: 1100px; margin: 0 auto; }
    .merch-main h1 { font-family: 'Assistant', sans-serif; font-weight: 400; font-size: 2rem; margin-bottom: 1.5rem; }

    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }
    .product-card { display: flex; flex-direction: column; }

    .product-img {
      width: 100%; aspect-ratio: 1; display: block;
      background: var(--sage-mid) center/cover; background-size: cover;
    }
    .product-name { font-size: 0.85rem; color: var(--text-dark); margin-top: 0.6rem; margin-bottom: 0.2rem; line-height: 1.3; }
    .product-price { font-size: 0.85rem; color: var(--text-mid); margin-bottom: 0.75rem; }

    .btn-options {
      width: 100%; padding: 0.65rem; background: transparent;
      border: 1px solid var(--text-dark); color: var(--text-dark);
      font-family: 'Assistant', sans-serif; font-size: 0.85rem; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-options:hover { background: var(--text-dark); color: var(--white); }

    /* ── Variant Modal ── */
    .variant-backdrop {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 1rem;
    }
    .variant-backdrop.open { display: flex; }

    .variant-modal {
      background: var(--cream); width: 100%; max-width: 420px;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .variant-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--sage-mid);
      background: var(--dark);
    }
    .variant-modal-header span {
      font-family: 'Assistant', sans-serif; font-weight: 700; font-size: 0.9rem;
      color: var(--white); letter-spacing: 0.05em; text-transform: uppercase;
    }
    .variant-close {
      background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.6);
      padding: 0.2rem; display: flex; align-items: center;
    }
    .variant-close svg { width: 18px; height: 18px; }

    .variant-modal-body { padding: 1.25rem; }

    .variant-product-row {
      display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.25rem;
    }
    .variant-product-img {
      width: 64px; height: 64px; flex-shrink: 0;
      background: var(--sage-mid) center/cover;
    }
    .variant-product-name {
      font-family: 'Assistant', sans-serif; font-weight: 600; font-size: 0.9rem;
      color: var(--text-dark); line-height: 1.3;
    }
    .variant-product-price {
      font-size: 0.85rem; color: var(--olive); font-weight: 600; margin-top: 0.2rem;
    }

    .variant-label {
      font-family: 'Assistant', sans-serif; font-weight: 700; font-size: 0.78rem;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light);
      margin-bottom: 0.5rem;
    }

    .size-grid {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.25rem;
    }
    .size-btn {
      padding: 0.45rem 0.85rem;
      border: 1px solid var(--sage-mid);
      background: transparent;
      font-family: 'Assistant', sans-serif; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; color: var(--text-dark);
    }
    .size-btn:hover { border-color: var(--text-dark); }
    .size-btn.selected {
      background: var(--text-dark); color: var(--white); border-color: var(--text-dark);
    }

    .variant-error {
      display: none; font-size: 0.8rem; color: #c0392b;
      font-family: 'Assistant', sans-serif; margin-bottom: 0.75rem;
    }
    .variant-error.visible { display: block; }

    .btn-add-to-cart {
      width: 100%; padding: 0.75rem;
      background: var(--dark); color: var(--white);
      font-family: 'Assistant', sans-serif; font-weight: 700; font-size: 0.95rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      border: none; cursor: pointer; transition: background 0.2s;
    }
    .btn-add-to-cart:hover { background: var(--olive); }

    @media (max-width: 900px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

  <div id="site-nav"></div>

  <div class="merch-main">
    <h1>Merchandise</h1>
    <div class="product-grid" id="product-grid"></div>
  </div>

  <!-- Size/Variant picker modal -->
  <div class="variant-backdrop" id="variant-backdrop">
    <div class="variant-modal">
      <div class="variant-modal-header">
        <span>Select Options</span>
        <button class="variant-close" onclick="closeVariantModal()" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="variant-modal-body">
        <div class="variant-product-row">
          <div class="variant-product-img" id="vm-img"></div>
          <div>
            <div class="variant-product-name" id="vm-name"></div>
            <div class="variant-product-price" id="vm-price"></div>
          </div>
        </div>
        <div class="variant-label">Size</div>
        <div class="size-grid" id="vm-sizes"></div>
        <div class="variant-error" id="vm-error">Please select a size.</div>
        <button class="btn-add-to-cart" onclick="confirmVariant()">Add to Cart</button>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="assets/shared.js"></script>
  <script>
    initPage('merch');

    const SIZES = ['XS', 'S', 'M', 'L', 'XL', '2XL', '3XL'];

    let pendingProduct = null;
    let selectedSize = null;

    function openVariantModal(product) {
      pendingProduct = product;
      selectedSize = null;

      document.getElementById('vm-img').style.backgroundImage = `url('${product.image}')`;
      document.getElementById('vm-name').textContent = product.name;
      document.getElementById('vm-price').textContent = product.price;
      document.getElementById('vm-error').classList.remove('visible');

      document.getElementById('vm-sizes').innerHTML = SIZES.map(s => `
        <button class="size-btn" data-size="${s}" onclick="selectSize('${s}')">${s}</button>
      `).join('');

      document.getElementById('variant-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeVariantModal() {
      document.getElementById('variant-backdrop').classList.remove('open');
      document.body.style.overflow = '';
      pendingProduct = null;
      selectedSize = null;
    }

    function selectSize(size) {
      selectedSize = size;
      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.size === size);
      });
      document.getElementById('vm-error').classList.remove('visible');
    }

    function confirmVariant() {
      if (!selectedSize) {
        document.getElementById('vm-error').classList.add('visible');
        return;
      }
      // Encode size into the cart item — unique id per size variant
      addToCart({
        ...pendingProduct,
        id: `${pendingProduct.id}-${selectedSize}`,
        name: `${pendingProduct.name} — ${selectedSize}`,
      });
      closeVariantModal();
    }

    // Close on backdrop click
    document.getElementById('variant-backdrop').addEventListener('click', function(e) {
      if (e.target === this) closeVariantModal();
    });

    fetch('assets/merch.json')
      .then(r => r.json())
      .then(items => {
        document.getElementById('product-grid').innerHTML = items.map(p => `
          <div class="product-card">
            <div class="product-img" style="background-image:url('${p.image}')"></div>
            <div class="product-name">${p.name}</div>
            <div class="product-price">${p.price}</div>
            ${p.type === 'options'
              ? `<button class="btn-options" onclick='openVariantModal(${JSON.stringify(p)})'>Select Options</button>`
              : `<button class="btn-options" onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>`
            }
          </div>`).join('');
      });
  </script>
</body>
</html>
