<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merch / Swag — Cascade Action Shooting Sports</title>
  <link rel="stylesheet" href="assets/shared.css" />
  <style>
    .merch-main { padding: 2.5rem 2rem 4rem; max-width: 1100px; margin: 0 auto; }
    .merch-main h1 { font-family: 'Assistant', sans-serif; font-weight: 400; font-size: 2rem; margin-bottom: 1.5rem; }

    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }
    .product-card { display: flex; flex-direction: column; }

    .product-img {
      width: 100%; aspect-ratio: 1; display: block;
      background: var(--sage-mid) center/cover; background-size: cover;
    }
    .product-name { font-size: 0.85rem; color: var(--text-dark); margin-top: 0.6rem; margin-bottom: 0.2rem; line-height: 1.3; }
    .product-price { font-size: 0.85rem; color: var(--text-mid); margin-bottom: 0.75rem; }

    .btn-options {
      width: 100%; padding: 0.65rem; background: transparent;
      border: 1px solid var(--text-dark); color: var(--text-dark);
      font-family: 'Assistant', sans-serif; font-size: 0.85rem; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-options:hover { background: var(--text-dark); color: var(--white); }

    .qty-stepper { display: flex; align-items: center; border: 1px solid var(--text-dark); }
    .qty-stepper button {
      width: 40px; height: 38px; flex-shrink: 0; background: transparent; border: none; cursor: pointer;
      font-size: 1.1rem; color: var(--text-dark); display: flex; align-items: center; justify-content: center; transition: background 0.15s;
    }
    .qty-stepper button:hover { background: rgba(0,0,0,0.06); }
    .qty-stepper input {
      flex: 1; text-align: center; border: none;
      border-left: 1px solid var(--text-dark); border-right: 1px solid var(--text-dark);
      background: transparent; font-family: 'Assistant', sans-serif; font-size: 0.9rem;
      padding: 0; height: 38px; outline: none; color: var(--text-dark);
    }

    @media (max-width: 900px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

  <div id="site-nav"></div>

  <div class="merch-main">
    <h1>Merchandise</h1>
    <div class="product-grid" id="product-grid">
      <!-- Populated from assets/merch.json -->
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="assets/shared.js"></script>
  <script>
    initPage('merch');

    function adj(btn, delta) {
      const input = btn.parentElement.querySelector('input');
      input.value = Math.max(0, parseInt(input.value || 0) + delta);
    }

    fetch('assets/merch.json')
      .then(r => r.json())
      .then(items => {
        document.getElementById('product-grid').innerHTML = items.map(p => `
          <div class="product-card">
            <div class="product-img" style="background-image:url('${p.image}')"></div>
            <div class="product-name">${p.name}</div>
            <div class="product-price">${p.price}</div>
            ${p.type === 'simple'
              ? `<div class="qty-stepper"><button onclick="adj(this,-1)">−</button><input type="number" value="0" min="0" /><button onclick="adj(this,1)">+</button></div>`
              : `<button class="btn-options">Choose options</button>`
            }
          </div>`).join('');
      });
  </script>
</body>
</html>
