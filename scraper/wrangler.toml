name = "practiscore-scraper"
main = "index.js"
compatibility_date = "2026-03-16"
compatibility_flags = ["nodejs_compat"]
observability = { enabled = true }

# Browser Rendering binding
[browser]
binding = "MYBROWSER"

# Service Binding: direct Worker-to-Worker call (bypasses workers.dev routing)
[[services]]
binding = "CASS_SITE"
service = "cass"

# KV Database for Caching
[[kv_namespaces]]
binding = "MATCH_DATA"
id = "f06e1acee402409aaf9b39d9bc1f87e3"

# Automatic background updates every 2 hours
[triggers]
crons = ["0 */2 * * *"]

[vars]
CASS_SITE_URL = "https://cass.cass-account.workers.dev"
