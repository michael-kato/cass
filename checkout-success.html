<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — Cascade Action Shooting Sports</title>
  <link rel="stylesheet" href="assets/shared.css" />
  <style>
    .success-content {
      max-width: 560px; margin: 0 auto;
      padding: 5rem 2rem; text-align: center;
    }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--olive); display: flex;
      align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .success-icon svg { width: 32px; height: 32px; color: #fff; }
    .success-content h1 {
      font-family: 'Assistant', sans-serif;
      font-weight: 700; font-size: 1.8rem; margin-bottom: 0.75rem;
    }
    .success-content p {
      font-size: 0.95rem; color: var(--text-mid);
      line-height: 1.7; margin-bottom: 2rem;
    }
    .btn-home {
      display: inline-block; padding: 0.75rem 2.5rem;
      background: var(--dark); color: #fff;
      font-family: 'Assistant', sans-serif; font-weight: 600;
      font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase;
      text-decoration: none; transition: background 0.2s;
    }
    .btn-home:hover { background: var(--olive); }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <div class="success-content">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Order Confirmed!</h1>
    <p>Thanks for your purchase. You'll receive a confirmation email shortly with your order details and tracking information once your order ships.</p>
    <a href="index.html" class="btn-home">Back to Home</a>
  </div>

  <div id="site-footer"></div>
  <script src="assets/shared.js"></script>
  <script>initPage('');</script>
</body>
</html>
