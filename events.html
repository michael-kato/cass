<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events — Cascade Action Shooting Sports</title>
  <link rel="stylesheet" href="assets/shared.css" />
  <style>
    .filters {
      background: var(--dark); padding: 1rem 2rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
    .search-wrap svg {
      position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: rgba(255,255,255,0.35); pointer-events: none;
    }
    .search-wrap input {
      width: 100%; padding: 0.55rem 0.75rem 0.55rem 2.25rem;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: var(--white); font-family: 'Assistant', sans-serif; font-size: 0.88rem; outline: none;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .search-wrap input:focus { border-color: var(--accent); }
    .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 0.45rem 1rem; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.65);
      font-family: 'Assistant', sans-serif; font-weight: 600; font-size: 0.82rem;
      letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--white); }
    .sort-select {
      padding: 0.5rem 0.75rem; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8);
      font-family: 'Assistant', sans-serif; font-size: 0.85rem; outline: none; cursor: pointer; margin-left: auto;
    }
    .sort-select option { background: var(--dark-mid); color: var(--white); }

    .results-bar {
      padding: 0.9rem 2rem; font-family: 'Assistant', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-light); border-bottom: 1px solid var(--sage-mid);
    }
    .results-bar span { color: var(--olive); font-weight: 700; }

    .events-section { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }

    .event-card {
      background: var(--sage-light); border: 1px solid var(--sage-mid);
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .event-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.15); }
    .event-card-img {
      width: 100%; height: 160px;
      background: linear-gradient(135deg, var(--olive), var(--sage-mid));
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .event-date-badge {
      position: absolute; top: 0.75rem; left: 0.75rem;
      background: var(--dark); color: var(--white); padding: 0.35rem 0.6rem; text-align: center; min-width: 48px;
    }
    .event-date-badge .month { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
    .event-date-badge .day { font-family: 'Assistant', sans-serif; font-size: 1.5rem; font-weight: 800; line-height: 1; }
    .event-state-badge {
      position: absolute; top: 0.75rem; right: 0.75rem;
      background: var(--accent); color: var(--white);
      font-weight: 700; font-size: 0.75rem; letter-spacing: 0.08em; padding: 0.2rem 0.5rem;
    }
    .event-card-body { padding: 1rem 1.1rem 1.25rem; flex: 1; display: flex; flex-direction: column; }
    .event-type-tag { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--olive); margin-bottom: 0.4rem; }
    .event-card h3 { font-family: 'Assistant', sans-serif; font-weight: 700; font-size: 1.15rem; line-height: 1.2; margin-bottom: 0.5rem; }
    .event-meta { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 0.9rem; }
    .event-meta-row { display: flex; align-items: center; gap: 0.4rem; font-size: 0.83rem; color: var(--text-light); }
    .event-meta-row svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--olive); }
    .event-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 0.75rem; border-top: 1px solid var(--sage-mid); }
    .event-spots { font-size: 0.8rem; color: var(--text-light); }
    .event-spots strong { color: var(--olive); }
    .btn-details {
      padding: 0.4rem 1rem; background: var(--dark); color: var(--white);
      font-family: 'Assistant', sans-serif; font-weight: 600; font-size: 0.82rem;
      letter-spacing: 0.06em; text-transform: uppercase; border: none; cursor: pointer; transition: background 0.2s;
    }
    .btn-details:hover { background: var(--olive); }

    .community-section { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; }
    .section-divider { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .section-divider h2 { font-family: 'Assistant', sans-serif; font-weight: 700; font-size: 1.3rem; white-space: nowrap; }
    .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--sage-mid); }
    .section-divider .divider-note { font-size: 0.8rem; color: var(--text-light); white-space: nowrap; }
    .community-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .community-card {
      background: var(--sage-light); border: 1px solid var(--sage-mid); border-left: 3px solid var(--olive-light);
      padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.4rem; cursor: pointer; transition: box-shadow 0.2s;
    }
    .community-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .community-card h4 { font-family: 'Assistant', sans-serif; font-weight: 700; font-size: 1.05rem; }
    .community-card p { font-size: 0.82rem; color: var(--text-light); line-height: 1.5; }
    .community-meta { font-size: 0.78rem; color: var(--olive); font-weight: 600; letter-spacing: 0.04em; }

    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--cream); max-width: 560px; width: 100%;
      max-height: 90vh; overflow-y: auto; position: relative;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .modal-img { width: 100%; height: 200px; background: linear-gradient(135deg, var(--olive), var(--sage-mid)); }
    .modal-close {
      position: absolute; top: 0.75rem; right: 0.75rem;
      background: rgba(0,0,0,0.5); border: none; cursor: pointer; color: white;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .modal-close svg { width: 18px; height: 18px; }
    .modal-body { padding: 1.5rem; }
    .modal-tag { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--olive); margin-bottom: 0.5rem; }
    .modal-body h2 { font-family: 'Assistant', sans-serif; font-weight: 800; font-size: 1.6rem; line-height: 1.15; margin-bottom: 1rem; }
    .modal-details { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1.25rem; }
    .modal-detail { display: flex; align-items: flex-start; gap: 0.5rem; }
    .modal-detail svg { width: 15px; height: 15px; color: var(--olive); flex-shrink: 0; margin-top: 2px; }
    .modal-detail-text label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-light); margin-bottom: 0.1rem; }
    .modal-detail-text span { font-size: 0.9rem; font-weight: 600; }
    .modal-desc { font-size: 0.9rem; line-height: 1.7; color: var(--text-mid); margin-bottom: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--sage-mid); }
    .modal-actions { display: flex; gap: 0.75rem; }
    .btn-register {
      flex: 1; padding: 0.75rem; background: var(--dark); color: var(--white);
      font-family: 'Assistant', sans-serif; font-weight: 700; font-size: 1rem;
      letter-spacing: 0.06em; text-transform: uppercase; border: none; cursor: pointer;
      text-align: center; text-decoration: none; display: block; transition: background 0.2s;
    }
    .btn-register:hover { background: var(--olive); }
    .btn-secondary {
      padding: 0.75rem 1.25rem; background: transparent; border: 1.5px solid var(--dark);
      font-family: 'Assistant', sans-serif; font-weight: 600; font-size: 0.9rem;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { background: var(--dark); color: var(--white); }

    @media (max-width: 768px) {
      .filters { gap: 0.5rem; }
      .sort-select { margin-left: 0; }
      .modal-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="site-nav"></div>

  <div class="filters">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search events, locations…" />
    </div>
    <div class="filter-group" id="type-filters">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="match">Matches</button>
      <button class="filter-btn" data-type="circuit">Circuit</button>
      <button class="filter-btn" data-type="training">Training</button>
      <button class="filter-btn" data-type="championship">Championship</button>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="date">Sort: Date</option>
      <option value="state">Sort: State</option>
      <option value="name">Sort: Name</option>
    </select>
  </div>

  <div class="results-bar">Showing <span id="results-count">0</span> upcoming events</div>

  <section class="events-section">
    <div class="events-grid" id="events-grid"></div>
  </section>

  <section class="community-section">
    <div class="section-divider">
      <h2>Community Events</h2>
      <span class="divider-note">Related but not official CASS events</span>
    </div>
    <div class="community-grid" id="community-grid"></div>
  </section>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <div class="modal-img" id="modal-img"></div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="modal-body">
        <div class="modal-tag" id="modal-tag"></div>
        <h2 id="modal-title"></h2>
        <div class="modal-details">
          <div class="modal-detail">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <div class="modal-detail-text"><label>Date</label><span id="modal-date"></span></div>
          </div>
          <div class="modal-detail">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <div class="modal-detail-text"><label>Location</label><span id="modal-location"></span></div>
          </div>
          <div class="modal-detail">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <div class="modal-detail-text"><label>Time</label><span id="modal-time"></span></div>
          </div>
          <div class="modal-detail">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <div class="modal-detail-text"><label>Capacity</label><span id="modal-capacity"></span></div>
          </div>
        </div>
        <div class="modal-desc" id="modal-desc"></div>
        <div class="modal-actions">
          <a href="#" class="btn-register" id="modal-register">Register Now</a>
          <button class="btn-secondary" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="assets/shared.js"></script>
  <script>
    initPage('events');

    const EVENTS = [
      { id:1, type:"circuit", name:"North Carolina Circuit — Stage 1", month:"APR", day:"12", dateSort:"2026-04-12", date:"April 12, 2026", time:"8:00 AM – 5:00 PM", state:"NC", location:"Piedmont Handgunner's Assoc., Greensboro, NC", spots:48, filled:32, desc:"The first stage of the North Carolina Circuit. Expect a mix of precision stages and fast movers.", registerUrl:"#" },
      { id:2, type:"match", name:"SVRC Season Kickoff Match", month:"APR", day:"19", dateSort:"2026-04-19", date:"April 19, 2026", time:"7:30 AM – 4:00 PM", state:"WA", location:"Snoqualmie Valley Rifle Club, Fall City, WA", spots:60, filled:44, desc:"The official season kickoff at SVRC. Six stages designed to challenge all skill levels.", registerUrl:"#" },
      { id:3, type:"match", name:"Low Light Event Series — Round 2", month:"MAY", day:"3", dateSort:"2026-05-03", date:"May 3, 2026", time:"6:00 PM – 10:00 PM", state:"TX", location:"Armory Indoor Range, Austin, TX", spots:30, filled:18, desc:"A unique low-light shooting challenge with WML-required stages.", registerUrl:"#" },
      { id:4, type:"championship", name:"PCSL Two Gun Championship", month:"MAY", day:"17", dateSort:"2026-05-17", date:"May 17–18, 2026", time:"7:00 AM – 6:00 PM", state:"VA", location:"Belvoir Indoor Shooting Range, Woodbridge, VA", spots:80, filled:77, desc:"The premier two-gun event of the spring season. Pistol and rifle required.", registerUrl:"#" },
      { id:5, type:"match", name:"Shotgun Stage Gun Match", month:"MAY", day:"24", dateSort:"2026-05-24", date:"May 24, 2026", time:"9:00 AM – 3:00 PM", state:"TN", location:"Nashville Practical Shooters, Nashville, TN", spots:40, filled:12, desc:"Shotgun-only match. All gauges welcome.", registerUrl:"#" },
      { id:6, type:"training", name:"New Shooter Fundamentals Clinic", month:"JUN", day:"7", dateSort:"2026-06-07", date:"June 7, 2026", time:"9:00 AM – 1:00 PM", state:"CO", location:"Front Range Gun Club, Colorado Springs, CO", spots:20, filled:6, desc:"Hands-on fundamentals training for shooters new to action sports.", registerUrl:"#" },
    ];

    const COMMUNITY = [
      { name:"Belvoir Indoor Tactical Series", meta:"Monthly · Woodbridge, VA", desc:"Monthly indoor tactical pistol match. CASS members get a $5 discount." },
      { name:"Cascade Valley Open", meta:"June 28, 2026 · Monroe, WA", desc:"An independent three-gun match organized by CASS members." },
      { name:"Texas Lone Star Multigun", meta:"July 12, 2026 · San Antonio, TX", desc:"Community-run multigun event with proceeds benefiting youth shooting programs." },
      { name:"Armory League Night", meta:"Weekly Fridays · Austin, TX", desc:"Weekly drop-in pistol league. Great for skill building between CASS matches." },
    ];

    let activeType = 'all', searchTerm = '', sortBy = 'date';

    function renderEvents() {
      let filtered = EVENTS.filter(e => {
        const typeMatch = activeType === 'all' || e.type === activeType;
        const searchMatch = !searchTerm || e.name.toLowerCase().includes(searchTerm) || e.location.toLowerCase().includes(searchTerm) || e.state.toLowerCase().includes(searchTerm);
        return typeMatch && searchMatch;
      });
      filtered.sort((a, b) => sortBy === 'state' ? a.state.localeCompare(b.state) : sortBy === 'name' ? a.name.localeCompare(b.name) : a.dateSort.localeCompare(b.dateSort));
      document.getElementById('results-count').textContent = filtered.length;
      document.getElementById('events-grid').innerHTML = filtered.length === 0
        ? `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-light)">No events match your filters.</div>`
        : filtered.map(e => `
          <div class="event-card" onclick="openModal(${e.id})">
            <div class="event-card-img">
              <div class="event-date-badge"><div class="month">${e.month}</div><div class="day">${e.day}</div></div>
              <div class="event-state-badge">${e.state}</div>
            </div>
            <div class="event-card-body">
              <div class="event-type-tag">${e.type}</div>
              <h3>${e.name}</h3>
              <div class="event-meta">
                <div class="event-meta-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${e.location}</div>
                <div class="event-meta-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${e.time}</div>
              </div>
              <div class="event-card-footer">
                <div class="event-spots"><strong>${e.spots - e.filled}</strong> spots left${(e.filled/e.spots)>=0.9?'<span style="color:#c0392b;font-weight:700;margin-left:0.3rem">· Almost full!</span>':''}</div>
                <button class="btn-details" onclick="event.stopPropagation();openModal(${e.id})">Details</button>
              </div>
            </div>
          </div>`).join('');
    }

    function renderCommunity() {
      document.getElementById('community-grid').innerHTML = COMMUNITY.map(c => `
        <div class="community-card">
          <div class="community-meta">${c.meta}</div>
          <h4>${c.name}</h4>
          <p>${c.desc}</p>
        </div>`).join('');
    }

    function openModal(id) {
      const e = EVENTS.find(x => x.id === id);
      if (!e) return;
      document.getElementById('modal-tag').textContent = e.type.toUpperCase();
      document.getElementById('modal-title').textContent = e.name;
      document.getElementById('modal-date').textContent = e.date;
      document.getElementById('modal-time').textContent = e.time;
      document.getElementById('modal-location').textContent = e.location;
      document.getElementById('modal-capacity').textContent = `${e.filled} / ${e.spots} registered`;
      document.getElementById('modal-desc').textContent = e.desc;
      document.getElementById('modal-register').href = e.registerUrl;
      document.getElementById('modal-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-backdrop').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.getElementById('type-filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn'); if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); activeType = btn.dataset.type; renderEvents();
    });
    document.getElementById('search-input').addEventListener('input', e => { searchTerm = e.target.value.toLowerCase().trim(); renderEvents(); });
    document.getElementById('sort-select').addEventListener('change', e => { sortBy = e.target.value; renderEvents(); });

    renderEvents();
    renderCommunity();
  </script>
</body>
</html>
